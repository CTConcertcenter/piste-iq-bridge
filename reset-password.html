<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<meta name="theme-color" content="#111111">
<title>Reset password — Piste IQ</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    background: #ffffff; color: #000000;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #000000; color: #ffffff; }
    .card { background: #1c1c1e; }
    .btn-secondary { color: #ffffff; border-color: rgba(255,255,255,0.3); }
  }
  .card {
    max-width: 420px; width: 100%;
    background: #fafafa; border-radius: 20px;
    padding: 36px 28px; text-align: center;
    box-shadow: 0 2px 24px rgba(0,0,0,0.06);
  }
  h1 { font-size: 22px; font-weight: 700; margin: 0 0 8px; }
  p { font-size: 15px; line-height: 1.4; margin: 0 0 20px; opacity: 0.7; }
  .btn {
    display: block; width: 100%; padding: 14px 20px;
    border-radius: 12px; text-decoration: none;
    font-weight: 600; font-size: 16px; margin-top: 12px;
    cursor: pointer; border: none;
  }
  .btn-primary { background: #007aff; color: #ffffff; }
  .btn-secondary { color: #000000; background: transparent; border: 1px solid rgba(0,0,0,0.2); }
  .small { font-size: 12px; opacity: 0.5; margin-top: 24px; }
</style>
</head>
<body>
<div class="card">
  <h1>Reset password</h1>
  <p>Tap below to finish resetting your password in Piste IQ.</p>
  <button class="btn btn-primary" id="open-app">Open Piste IQ</button>
  <a class="btn btn-secondary" href="https://apps.apple.com/app/id0000000000">Get Piste IQ on the App Store</a>
  <div class="small">Don't have the app? Install first, then tap the link in the email again.</div>
</div>
<script>
  var search = window.location.search || "";
  var hash = window.location.hash || "";
  var deepLink = "fencingopp://recovery" + search + hash;
  document.getElementById("open-app").addEventListener("click", function () {
    window.location.href = deepLink;
  });
  window.addEventListener("DOMContentLoaded", function () {
    setTimeout(function () { window.location.href = deepLink; }, 150);
  });
</script>
</body>
</html>
